name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DSYSTEMS_ENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
